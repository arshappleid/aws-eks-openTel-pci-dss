name: Run Ansible Playbooks

on:
    workflow_dispatch:

env:
    AWS_REGION: us-east-1
    GITHUB_ACTION_IAM_ROLE: arn:aws:iam::866934333672:role/GITHUB-ACTIONS-ALL-REPO

permissions:
    id-token: write
    contents: read

jobs:
    run-ansible:
        name: Run Ansible via Bastion
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ env.GITHUB_ACTION_IAM_ROLE }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Fetch Bastion Public IP
              run: |
                  BASTION_IP=$(aws ec2 describe-instances \
                    --filters "Name=tag:Name,Values=bastion-server" "Name=instance-state-name,Values=running" \
                    --query "Reservations[0].Instances[0].PublicIpAddress" \
                    --region ${{ env.AWS_REGION }} --output text)
                  if [ -z "$BASTION_IP" ] || [ "$BASTION_IP" == "None" ]; then
                    echo "Error: No running Bastion instance found."
                    exit 1
                  fi
                  echo "BASTION_IP=$BASTION_IP" >> $GITHUB_ENV

            - name: Setup SSH Key
              run: |
                  echo "${{ secrets.BASTION_PRIVATE_KEY }}" > private_key.pem
                  chmod 400 private_key.pem

            - name: Copy Ansible Assets to Bastion
              run: |
                  
                  ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ env.BASTION_IP }} "mkdir -p /home/ec2-user/ansible"
                  scp -r -o StrictHostKeyChecking=no -i private_key.pem ./ansible/* ec2-user@${{ env.BASTION_IP }}:/home/ec2-user/ansible/

            - name: Copy EKS Node Key Pair to Bastion
              run: |
                  
                  scp -o StrictHostKeyChecking=no -i private_key.pem private_key.pem ec2-user@${{ env.BASTION_IP }}:/home/ec2-user/.ssh/prab-key-pair.pem
                  ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ env.BASTION_IP }} "chmod 400 /home/ec2-user/.ssh/prab-key-pair.pem"

            - name: Execute Ansible Playbook
              run: |
                  ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ env.BASTION_IP }} "cd /home/ec2-user/ansible && ansible-playbook -i inventory.ini playbooks/patch-nodes.yml --private-key=/home/ec2-user/.ssh/prab-key-pair.pem"

            - name: Clean Up Key
              if: always()
              run: rm -f private_key.pem
