name: Check Compliance

on:
  workflow_dispatch:
    inputs:
      tag_key:
        description: 'Tag key to filter resources (e.g. Project)'
        required: true
        default: 'Project'
      tag_value:
        description: 'Tag value to filter resources (e.g. aws-eks-openTel-pci-dss)'
        required: true
        default: 'aws-eks-openTel-pci-dss'
  push:
    branches:
      - dev
      - stage
      - prod
    paths:
      - 'terraform/**'
      - 'scripts/**'
  schedule:
    - cron: '0 9 * * *' # Daily at 9:00 AM UTC

env:
  AWS_REGION: us-east-1
  GITHUB_ACTION_IAM_ROLE: arn:aws:iam::866934333672:role/GITHUB-ACTIONS-ALL-REPO

permissions:
  id-token: write
  contents: read

jobs:
  compliance-audit:
    name: PCI-DSS Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GITHUB_ACTION_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            **/requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3

      - name: Run Active Resource Compliance Scan
        run: |
          python scripts/check_compliance.py --tag-key "${{ github.event.inputs.tag_key || 'Project' }}" --tag-value "${{ github.event.inputs.tag_value || 'aws-eks-openTel-pci-dss' }}"

      - name: Run Checkov Static Compliance Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: cli
          soft_fail: true # Logs PCI-DSS alerts as warnings without failing the runner
