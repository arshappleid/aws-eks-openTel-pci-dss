name: Terraform Plan

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev
      - stage
      - prod
      - shared
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ["${{ github.base_ref || github.ref_name }}"]
        layer: [network, compute, kubernetes]
        exclude:
          - environment: shared
            layer: kubernetes
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}/${{ matrix.layer }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check if layer changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - 'terraform/environments/${{ matrix.environment }}/${{ matrix.layer }}/**'
              - 'terraform/environments/shared/**'
              - 'terraform/modules/**'
              - 'terraform/*.tf'
              
      - name: Configure AWS Credentials
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          
      - name: Setup Terraform
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ secrets.TF_VERSION }}

      - name: Terraform Init
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_S3_BACKEND_BUCKET }}" \
            -backend-config="key=eks-project/tfstate/${{ matrix.environment }}/${{ matrix.layer }}/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Select Terraform Workspace
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          terraform workspace select ${{ matrix.environment }} || terraform workspace new ${{ matrix.environment }}

      # shared uses shared.tfvars; all other environments use <env>.tfvars
      - name: Terraform Plan
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: plan
        run: |
          if [ "${{ matrix.environment }}" = "shared" ]; then
            VAR_FILE="shared.tfvars"
          else
            VAR_FILE="${{ matrix.environment }}.tfvars"
          fi

          if [ "${{ matrix.layer }}" = "kubernetes" ]; then
            terraform plan -no-color -var-file="$VAR_FILE" -out=tfplan \
              || echo "WARNING: Kubernetes layer plan failed (likely due to private network connectivity), continuing as requested."
          else
            terraform plan -no-color -var-file="$VAR_FILE" -out=tfplan
          fi
