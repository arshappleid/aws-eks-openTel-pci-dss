name: Terraform Drift Detection

on:
    workflow_dispatch:
    schedule:
        - cron: "0 8 * * *" 

permissions:
    id-token: write
    contents: read
    issues: write

jobs:
    drift-detection:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                environment: [dev, stage, prod, shared]
                layer: [network, compute, kubernetes]
                exclude:
                  - environment: shared
                    layer: kubernetes
        defaults:
            run:
                working-directory: terraform/environments/${{ matrix.environment }}/${{ matrix.layer }}
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: ${{ secrets.TF_VERSION }}

            - name: Terraform Init
              run: |
                  terraform init \
                    -backend-config="bucket=${{ secrets.TF_S3_BACKEND_BUCKET }}" \
                    -backend-config="key=eks-project/tfstate/${{ matrix.environment }}/${{ matrix.layer }}/terraform.tfstate" \
                    -backend-config="region=us-east-1"

            - name: Select Terraform Workspace
              run: |
                  terraform workspace select ${{ matrix.environment }} || terraform workspace new ${{ matrix.environment }}

            # shared uses shared.tfvars; all other environments use <env>.tfvars
            - name: Terraform Plan (Drift Detection)
              id: plan
              run: |
                if [ "${{ matrix.environment }}" = "shared" ]; then
                  VAR_FILE="shared.tfvars"
                else
                  VAR_FILE="${{ matrix.environment }}.tfvars"
                fi
                terraform plan -detailed-exitcode -var-file="$VAR_FILE"
              continue-on-error: true

            - name: Report Drift
              if: steps.plan.outputs.exitcode == 2
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  echo "Drift detected in ${{ matrix.environment }} ${{ matrix.layer }}!"
                  gh issue create \
                    --title "Terraform Drift Detected: ${{ matrix.environment }} / ${{ matrix.layer }}" \
                    --body "Terraform has detected configuration drift in the **${{ matrix.environment }}** environment for the **${{ matrix.layer }}** layer. Please review the GitHub Actions logs." \
                    --assignee "${{ github.repository_owner }}" || echo "Failed to create issue"
                  exit 1
