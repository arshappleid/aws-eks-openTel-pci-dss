name: Terraform Apply

on:
    workflow_dispatch:
    push:
        branches:
            - dev
            - stage
            - prod
            - shared
        paths:
            - "terraform/**"

permissions:
    id-token: write
    contents: read

jobs:
    apply:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                environment: ["${{ github.ref_name }}"]
                layer: [network, compute, kubernetes]
                exclude:
                  - environment: shared
                    layer: kubernetes
            max-parallel: 1
        defaults:
            run:
                working-directory: terraform/environments/${{ matrix.environment }}/${{ matrix.layer }}
        steps:
            - uses: actions/checkout@v4

            - name: Check if layer changed
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      changed:
                        - 'terraform/environments/${{ matrix.environment }}/${{ matrix.layer }}/**'
                        - 'terraform/environments/shared/**'
                        - 'terraform/modules/**'
                        - 'terraform/*.tf'

            - name: Configure AWS Credentials
              if: steps.filter.outputs.changed == 'true'
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Setup Terraform
              if: steps.filter.outputs.changed == 'true'
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: ${{ secrets.TF_VERSION }}

            - name: Terraform Init
              if: steps.filter.outputs.changed == 'true'
              run: |
                  terraform init \
                    -backend-config="bucket=${{ secrets.TF_S3_BACKEND_BUCKET }}" \
                    -backend-config="key=eks-project/tfstate/${{ matrix.environment }}/${{ matrix.layer }}/terraform.tfstate" \
                    -backend-config="region=us-east-1"

            - name: Select Terraform Workspace
              if: steps.filter.outputs.changed == 'true'
              run: |
                  terraform workspace select ${{ matrix.environment }} || terraform workspace new ${{ matrix.environment }}

            # shared uses shared.tfvars; all other environments use <env>.tfvars
            - name: Terraform Apply
              if: steps.filter.outputs.changed == 'true'
              run: |
                if [ "${{ matrix.environment }}" = "shared" ]; then
                  VAR_FILE="shared.tfvars"
                else
                  VAR_FILE="${{ matrix.environment }}.tfvars"
                fi

                if [ "${{ matrix.layer }}" = "kubernetes" ]; then
                  terraform apply -auto-approve -var-file="$VAR_FILE" \
                    || echo "WARNING: Kubernetes layer apply failed (likely due to private network connectivity), continuing as requested."
                else
                  terraform apply -auto-approve -var-file="$VAR_FILE"
                fi
