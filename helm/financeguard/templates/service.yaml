apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name | default (printf "%s-service" (.Values.appName | default (include "financeguard.fullname" .))) }}
  labels:
    {{- include "financeguard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port | default 80 }}
      targetPort: {{ .Values.service.targetPort | default 80 }}
  selector:
    app: {{ .Values.appName | default (include "financeguard.name" .) }}
