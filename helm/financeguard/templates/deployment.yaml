apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName | default (include "financeguard.fullname" .) }}
  labels:
    {{- include "financeguard.labels" . | nindent 4 }}
    app: {{ .Values.appName | default (include "financeguard.name" .) }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.appName | default (include "financeguard.name" .) }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName | default (include "financeguard.name" .) }}
        {{- include "financeguard.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Values.containerName | default .Chart.Name }}
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag | default "latest" }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.containerPort | default 80 }}
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
