apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName | default (include "financeguard.fullname" .) }}
  labels:
    {{- include "financeguard.labels" . | nindent 4 }}
    app: {{ .Values.appName | default (include "financeguard.name" .) }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.appName | default (include "financeguard.name" .) }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName | default (include "financeguard.name" .) }}
        {{- include "financeguard.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Values.containerName | default .Chart.Name }}
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag | default "latest" }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.containerPort | default 80 }}
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

        {{- if .Values.otelSidecar.enabled }}
        # OTEL Collector sidecar — receives telemetry from the app on localhost and
        # forwards to the central observability stack in the inspection VPC via Cloud Map DNS.
        - name: otel-collector
          image: "{{ .Values.otelSidecar.image.repository }}:{{ .Values.otelSidecar.image.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - "--config=/etc/otel/otel-collector-config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
        {{- end }}

      {{- if .Values.otelSidecar.enabled }}
      volumes:
        - name: otel-config
          configMap:
            name: {{ .Values.appName | default (include "financeguard.fullname" .) }}-otel-config
      {{- end }}
