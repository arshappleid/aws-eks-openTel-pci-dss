



replicaCount: 1

image:
  repository: financeguard-backend
  tag: latest
  digest: ""
  pullPolicy: IfNotPresent

containerPort: 80
containerName: app

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env: []

# OTEL sidecar collector — disabled by default; enabled per-environment in gitops values.
# When enabled, the app should point OTEL_EXPORTER_OTLP_ENDPOINT to http://localhost:4317
# so the sidecar relays telemetry to the central observability stack in the inspection VPC.
otelSidecar:
  enabled: false
  environment: "dev"
  # Cloud Map private DNS resolving to the bastion in the inspection VPC.
  # Bastion exposes: Jaeger OTLP on :4317, Prometheus at /prometheus/, Loki at /loki/
  centralCollectorEndpoint: "otel-collector.financeguard.local"
  image:
    repository: 866934333672.dkr.ecr.us-east-1.amazonaws.com/otel-collector-contrib
    tag: "0.104.0"
