# Default values for financeguard.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: financeguard-backend
  tag: latest
  digest: ""
  pullPolicy: IfNotPresent

containerPort: 80
containerName: app

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env: []
