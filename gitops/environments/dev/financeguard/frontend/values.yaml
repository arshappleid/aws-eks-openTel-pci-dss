
replicaCount: 2

appName: financeguard-frontend
nameOverride: financeguard-frontend
fullnameOverride: financeguard-frontend
containerName: react-frontend

image:
  repository: 866934333672.dkr.ecr.us-east-1.amazonaws.com/prab-eks-frontend
  tag: latest
  pullPolicy: Always

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  - name: API_URL
    value: "http://inspection-alb-564595949.us-east-1.elb.amazonaws.com/dev/api/"

service:
  port: 80
  targetPort: 80


otelSidecar:
  enabled: true
  environment: "dev"
  centralCollectorEndpoint: "otel-collector.financeguard.local"
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.104.0"
