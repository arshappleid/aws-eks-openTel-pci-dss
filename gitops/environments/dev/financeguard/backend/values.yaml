
replicaCount: 2

appName: financeguard-backend
containerName: fastapi-backend

image:
  repository: financeguard-backend
  tag: latest

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: ENVIRONMENT
    value: "dev"
  # App sends telemetry to the local OTEL sidecar; sidecar forwards to the central
  # collector in the inspection VPC via Cloud Map DNS (otel-collector.financeguard.local).
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://localhost:4317"

otelSidecar:
  enabled: true
  environment: "dev"
  centralCollectorEndpoint: "otel-collector.financeguard.local"
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.104.0"
