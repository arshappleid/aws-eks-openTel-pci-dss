apiVersion: 1

groups:
  - orgId: 1
    name: 'financeguard-resource-alerts'
    folder: 'FinanceGuard'
    interval: 1m
    rules:
      - uid: cpu-consumption-alert
        title: 'High CPU Consumption Alert'
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: 'sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (namespace, pod) > 0.8'
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: 'High CPU consumption detected on pod'
          description: 'CPU consumption is above 80% for more than 5 minutes on {{ $labels.namespace }}/{{ $labels.pod }}.'
        labels:
          severity: critical

      - uid: memory-consumption-alert
        title: 'High Memory Consumption Alert'
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: 'sum(container_memory_working_set_bytes{container!=""}) by (namespace, pod) > 400000000'
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: 'High Memory consumption detected on pod'
          description: 'Memory working set size is above 400MB for more than 5 minutes on {{ $labels.namespace }}/{{ $labels.pod }}.'
        labels:
          severity: critical

contactPoints:
  - orgId: 1
    name: 'email-contact-point'
    receivers:
      - uid: email-receiver-1
        type: email
        settings:
          addresses: '${emails}'
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: 'email-contact-point'
    group_by: ['alertname', 'namespace', 'pod']
    group_wait: 10s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: 'email-contact-point'
        object_matchers:
          - ['severity', '=', 'critical']
